apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dr-nai-to-dc02
  namespace: nai-workspace
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: nai-gitops
    namespace: kommander
  path: ./workload/sites/dc02/dr
  prune: true
  wait: true
  timeout: 30m
  suspend: false
  kubeConfig:
