# gitops/management-projects.yaml
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nai-projects
  namespace: nai-workspace
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: nai-gitops
    namespace: kommander
  path: ./management/projects
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: nai-workspaces
      namespace: kommander
