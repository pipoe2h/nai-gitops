# bootstrap/gitrepository.yaml
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: nai-gitops
  namespace: kommander
spec:
  interval: 1m
  url: https://github.com/pipoe2h/nai-gitops
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nai-root
  namespace: kommander
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: nai-gitops
  path: ./gitops
  prune: true
  wait: true
  timeout: 5m
