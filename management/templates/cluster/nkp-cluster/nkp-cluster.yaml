apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  annotations:
    preflight.cluster.caren.nutanix.com/skip: all
  labels:
    cluster.x-k8s.io/provider: nutanix
    konvoy.d2iq.io/cluster-name: nkp-cluster-template
    konvoy.d2iq.io/provider: nutanix
  name: nkp-cluster-template
  namespace: nai-workspace
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - 192.168.0.0/16
    services:
      cidrBlocks:
        - 10.96.0.0/12
  controlPlaneEndpoint:
    host: ""
    port: 0
  topology:
    class: nkp-nutanix-v2.17.0
    controlPlane:
      metadata: {}
      replicas: 1
    variables:
      - name: clusterConfig
        value:
          addons:
            ccm:
              credentials:
                secretRef:
                  name: pc-credentials
              strategy: HelmAddon
            clusterAutoscaler:
              strategy: HelmAddon
            cni:
              provider: Cilium
              strategy: HelmAddon
            cosi:
              strategy: HelmAddon
            csi:
              defaultStorage:
                provider: nutanix
                storageClassConfig: volume
              providers:
                nutanix:
                  strategy: HelmAddon
                  credentials:
                    secretRef:
                      name: pc-credentials-for-csi
                  storageClassConfigs:
                    volume:
                      allowExpansion: true
                      parameters:
                        csi.storage.k8s.io/fstype: ext4
                        description: Nutanix volume
                        hypervisorAttached: DISABLED
                        storageContainer: SelfServiceContainer
                        storageType: NutanixVolumes
                      reclaimPolicy: Delete
                      volumeBindingMode: WaitForFirstConsumer
              snapshotController:
                strategy: HelmAddon
            konnectorAgent:
              credentials:
                secretRef:
                  name: pc-credentials-for-konnector-agent
            nfd:
              strategy: HelmAddon
            serviceLoadBalancer:
              configuration:
                addressRanges:
                  - end: ""
                    start: ""
              provider: MetalLB
          controlPlane:
            taints: []
            autoRenewCertificates:
              daysBeforeExpiry: 180
            nodeRegistration:
              ignorePreflightErrors:
                - SystemVerification
            nutanix:
              machineDetails:
                bootType: uefi
                cluster:
                  name: ""
                  type: name
                image:
                  name: ""
                  type: name
                memorySize: 24Gi
                subnets:
                  - name: ""
                    type: name
                systemDiskSize: 80Gi
                vcpuSockets: 12
                vcpusPerSocket: 1
          dns:
            coreDNS: {}
          encryptionAtRest:
            providers:
              - secretbox: {}
          kubeProxy:
            mode: disabled
          nutanix:
            controlPlaneEndpoint:
              host: ""
              port: 6443
              virtualIP:
                provider: KubeVIP
            prismCentralEndpoint:
              credentials:
                secretRef:
                  name: pc-credentials
              url: ""
    version: v1.34.1
    workers: {}
