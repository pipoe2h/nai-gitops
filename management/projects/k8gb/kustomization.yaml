apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../templates/project

patches:
  - target:
      kind: Project
      name: project-template
    patch: |-
      - op: replace
        path: /metadata/name
        value: k8gb
      - op: replace
        path: /spec/namespaceName
        value: k8gb
      - op: replace
        path: /metadata/annotations/kommander.mesosphere.io~1display-name
        value: k8gb
