gateway:
  replicaCount: "1"
  certManager:
    selfSigned: true
  envoyDeployment:
    container:
      image: "registry.nutanixdemo.com/bootcamps/nutanix/nai-envoy:distroless-v1.37.0"

naiDatabase:
  external: true
  postgresql:
    postgresHost: nai-db-rw.nai-db.svc.cluster.local
    postgresSSLMode: require
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi

naiApi:
  naiApiImage:
    image: registry.nutanixdemo.com/bootcamps/nutanix/nai-api
  replicaCount: "1"

  naiApiResources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

  naiMigrateInitContainerResources:
    requests:
      cpu: 100m
      memory: 50Mi
    limits:
      cpu: "1"
      memory: 1Gi

  naiMigrateJobResources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 1Gi

naiLabs:
  enabled: true

  labsImage:
    image: registry.nutanixdemo.com/bootcamps/nutanix/nai-rag-app
    tag: v2.7.0

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi

otelCollector:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi

targetAllocator:
  resources:
    requests:
      cpu: 25m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 128Mi

oauth2Proxy:
  image:
    repository: registry.nutanixdemo.com/bootcamps/nai-oauth2-proxy

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Actual oauth2-proxy chart used by NAI
oauth2-proxy:
  image:
    repository: registry.nutanixdemo.com/bootcamps/nai-oauth2-proxy
    tag: v7.9.0

redis:
  master:
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 256Mi

  sentinel:
    resources:
      requests:
        cpu: 25m
        memory: 16Mi
      limits:
        cpu: 100m
        memory: 128Mi

naiAgent:
  agentImage:
    image: registry.nutanixdemo.com/bootcamps/nutanix/nai-agent-app

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 750m
      memory: 2Gi

naiInferenceUi:
  naiUiImage:
