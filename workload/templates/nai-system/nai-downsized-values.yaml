    tag: v2.7.0
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

naiIam:
  iamProxy:
    image: registry.nutanixdemo.com/bootcamps/nai-iam-proxy
    tag: v2.7.0

  iamProxyControlPlane:
    image: registry.nutanixdemo.com/bootcamps/nutanix/nai-iam-proxy-control-plane
    tag: v2.7.0

  iamUi:
    image: registry.nutanixdemo.com/bootcamps/nai-iam-ui
    tag: v2.7.0

  iamUserAuthn:
    image: registry.nutanixdemo.com/bootcamps/nai-iam-user-authn
