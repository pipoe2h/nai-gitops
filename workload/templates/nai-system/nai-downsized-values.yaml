  naiJobsImage:
    image: registry.nutanixdemo.com/bootcamps/nutanix/nai-jobs

  resources:
    requests:
      cpu: 50m
      memory: 50Mi
    limits:
      cpu: 250m
      memory: 256Mi

nai-clickhouse-operator:
  operator:
    image:
      registry: registry.nutanixdemo.com/bootcamps
      repository: nutanix/nai-clickhouse-operator

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  metrics:
    image:
      registry: registry.nutanixdemo.com/bootcamps
      repository: nutanix/nai-clickhouse-metrics-exporter

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

nai-clickhouse-schemas:
  image:
    registry: registry.nutanixdemo.com/bootcamps
    repository: nutanix/nai-clickhouse-schemas

nai-clickhouse-server:
  clickhouse:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    image:
      registry: registry.nutanixdemo.com/bootcamps
      repository: nutanix/nai-clickhouse-server
    initContainers:
      addUdf:
        image:
          registry: registry.nutanixdemo.com/bootcamps
          repository: nutanix/nai-clickhouse-udf
      waitForKeeper:
        image:
          registry: registry.nutanixdemo.com/bootcamps
          repository: nutanix/nai-jobs

nai-clickhouse-keeper:
  clickhouseKeeper:
    image:
      registry: registry.nutanixdemo.com/bootcamps
      repository: nutanix/nai-clickhouse-keeper
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 256Mi

# IEP Operator
naiIepOperator:
  iepOperatorImage:
    image: registry.nutanixdemo.com/bootcamps/nutanix/nai-iep-operator
    tag: v2.7.0

# OpenTelemetry images
naiMonitoring:
  opentelemetry:
    collectorImage: registry.nutanixdemo.com/bootcamps/nutanix/nai-opentelemetry-collector-contrib:0.141.0

    targetAllocator:
      image:
        repository: registry.nutanixdemo.com/bootcamps/nutanix/nai-target-allocator
        tag: 0.141.0
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi

ai-gateway-helm:
  extProc:
    image:
      repository: registry.nutanixdemo.com/bootcamps/nutanix/nai-ai-gateway-extproc

  controller:
