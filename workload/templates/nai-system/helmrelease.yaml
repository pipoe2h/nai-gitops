apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nai-operators
  namespace: nai-system
spec:
  interval: 30m
  serviceAccountName: nai-helm

  chart:
    spec:
      chart: nai-operators
      version: 2.7.0
      sourceRef:
        kind: HelmRepository
        name: ntnx-charts
        namespace: nai-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  valuesFrom:
    - kind: ConfigMap
      name: nai-operators-values
      valuesKey: values.yaml
